<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا | Aura Fashion</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="scrolled">
        <div class="container">
            <nav>
                <div class="logo">Aura</div>
                <ul class="nav-links">
                    <li><a href="index.html">الرئيسية</a></li>
                    <li><a href="shop.html">المتجر</a></li>
                    <li><a href="sales.html">التخفيضات</a></li>
                    <li><a href="about.html">من نحن</a></li>
                    <li><a href="contact.html" class="active">تواصل معنا</a></li>
                </ul>
                <div class="nav-icons">
                    <a href="cart.html"><i class="fa-solid fa-cart-shopping"></i></a>
                    <div class="menu-toggle" id="menu-toggle">
                        <i class="fa-solid fa-bars"></i>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main style="padding-top: 150px; padding-bottom: 100px;" class="container">
        <div style="max-width: 800px; margin: 0 auto; background: var(--white); padding: 60px; border-radius: 40px; box-shadow: var(--shadow);">
            <div class="section-header">
                <h2>يسعدنا تواصلكِ معنا</h2>
                <p>فريقنا في انتظارك لتقديم المساعدة والإجابة على استفساراتك.</p>
            </div>
            
            <form action="https://formsubmit.co/el-fki@email.com" method="POST" style="display: grid; gap: 20px;">
                <input type="text" name="name" placeholder="الاسم الكامل" required style="padding: 15px 25px; border-radius: 50px; border: 1px solid rgba(27,48,34,0.1); outline: none; font-family: inherit;">
                <input type="email" name="email" placeholder="البريد الإلكتروني" required style="padding: 15px 25px; border-radius: 50px; border: 1px solid rgba(27,48,34,0.1); outline: none; font-family: inherit;">
                <textarea name="message" placeholder="رسالتكِ.." rows="5" required style="padding: 15px 25px; border-radius: 30px; border: 1px solid rgba(27,48,34,0.1); outline: none; font-family: inherit; resize: none;"></textarea>
                <button type="submit" class="btn btn-primary">إرسال الرسالة</button>
            </form>

            <div style="margin-top: 60px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; text-align: center;">
                <div>
                    <i class="fa-solid fa-phone" style="color: var(--accent); font-size: 1.5rem; margin-bottom: 15px;"></i>
                    <p>+966 500 000 000</p>
                </div>
                <div>
                    <i class="fa-solid fa-envelope" style="color: var(--accent); font-size: 1.5rem; margin-bottom: 15px;"></i>
                    <p>contact@aura.com</p>
                </div>
                <div>
                    <i class="fa-solid fa-location-dot" style="color: var(--accent); font-size: 1.5rem; margin-bottom: 15px;"></i>
                    <p>الرياض، المملكة العربية السعودية</p>
                </div>
            </div>
        </div>
    </main>

    <footer style="background-color: var(--primary); color: var(--white); padding: 50px 0; text-align: center;">
        <div class="logo" style="color: var(--white); margin-bottom: 20px;">Aura</div>
        <p>&copy; 2026 Aura Fashion. جميع الحقوق محفوظة.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
